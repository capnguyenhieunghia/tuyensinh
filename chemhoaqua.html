<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Chém Hoa Quả</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: auto;
            background-color: #fff;
            border: none;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: #333;
        }
        #timer {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: #333;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: red;
        }
        .slice {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            transition: transform 0.5s;
        }
    </style>
</head>
<body>
    <div id="score">Điểm: 0</div>
    <div id="timer">Thời gian: 60</div>
    <div id="gameOver">Trò Chơi Kết Thúc! Điểm: <span id="finalScore"></span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let fruits = [];
        const fruitImages = ['🍎', '🍌', '🍉', '🍇', '🍍', '🍓'];
        let timer = 60;
        let gameInterval;

        function Fruit() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height;
            this.size = 50;
            this.image = fruitImages[Math.floor(Math.random() * fruitImages.length)];
            this.speed = 2 + Math.random() * 3;

            this.update = function() {
                this.y -= this.speed;
                if (this.y < -this.size) {
                    this.reset();
                }
            };

            this.reset = function() {
                this.y = canvas.height;
                this.x = Math.random() * canvas.width;
            };

            this.draw = function() {
                ctx.font = '40px Arial';
                ctx.fillText(this.image, this.x, this.y);
            };
        }

        function spawnFruit() {
            fruits.push(new Fruit());
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fruits.forEach((fruit, index) => {
                fruit.update();
                fruit.draw();
                if (fruit.y < 0) {
                    fruits.splice(index, 1);
                }
            });
            requestAnimationFrame(update);
        }

        function handleTouch(event) {
            const touchX = event.touches[0].clientX;
            const touchY = event.touches[0].clientY;
            fruits.forEach((fruit, index) => {
                if (touchX >= fruit.x && touchX <= fruit.x + fruit.size &&
                    touchY >= fruit.y - fruit.size && touchY <= fruit.y) {
                    score++;
                    document.getElementById('score').innerText = 'Điểm: ' + score;
                    createSliceEffect(fruit.x, fruit.y);
                    fruits.splice(index, 1);
                }
            });
        }

        function createSliceEffect(x, y) {
            const slice = document.createElement('div');
            slice.className = 'slice';
            slice.innerText = '💥';
            slice.style.left = `${x}px`;
            slice.style.top = `${y}px`;
            document.body.appendChild(slice);
            setTimeout(() => {
                slice.style.transform = 'scale(0)';
            }, 0);
            setTimeout(() => {
                slice.remove();
            }, 500);
        }

        function updateTimer() {
            timer--;
            document.getElementById('timer').innerText = 'Thời gian: ' + timer;

            if (timer <= 0) {
                clearInterval(gameInterval);
                endGame();
            }
        }

        function endGame() {
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
            canvas.style.display = 'none';
        }

        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);
        setInterval(spawnFruit, 1000);
        gameInterval = setInterval(updateTimer, 1000);
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị Dữ liệu từ Google Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 5px 0px;
            text-align: center;
            font-size: 11px;
        }

        th {
            background-color: #f2f2f2;
        }

        #search {
            width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        @media (min-width: 1201px) {
            th,
        td {
            border: 1px solid #ddd;
            padding: 5px 0px;
            text-align: center;
            font-size: 16px;
        }
          
        }
    </style>
</head>

<body>

    <h2 style="text-align: center; margin: 10px 0;">DỮ LIỆU HSSV ĐÃ ĐĂNG KÝ</h2>
    <div style="display: flex; justify-content: center; gap: 10px; margin: 10px 0;">
        <a href="./home.html" style="color: navy; font-size: 15px;">Trang người dùng</a>
        <a href="https://docs.google.com/spreadsheets/d/1FwJtZwByjsBmpp46I2i0jyY-SzfzDEaOKEukctoHw2k/edit?usp=sharing"
            style="color: navy; font-size: 15px;">File
            dữ liệu</a>
        <a href="https://docs.google.com/spreadsheets/d/1EcpSZ8XmuDuT-z7QGbdaJp-FHHbj-pi79ST8C_y4wBY/edit?usp=sharing"
            style="color: navy; font-size: 15px;">File
            câu hỏi</a>
    </div>
    <input type="text" id="search" placeholder="Tìm kiếm theo tên hoặc SĐT..." onkeyup="filterTable()">
    <table id="data-table">
        <thead>
            <tr>
                <th>Dấu thời gian</th>
                <th>SĐT</th>
                <th>Họ và tên</th>
                <th>Trường</th>
                <th>Ngày sinh</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dữ liệu sẽ được thêm vào đây -->
        </tbody>
    </table>
    <p style="font-size: 10px; height: 0; width: 100%; margin: 0; text-align: center; color: gray;">&copy; 2024
        P. TS - TT Trường Cao đẳng Công nghệ thông tin TP. HCM</p>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1FwJtZwByjsBmpp46I2i0jyY-SzfzDEaOKEukctoHw2k/gviz/tq?tqx=out:csv';

        fetch(sheetUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Bỏ qua dòng tiêu đề
                const tbody = document.querySelector('#data-table tbody');
                rows.forEach(row => {
                    const cols = row.split(',').map(col => col.replace(/"/g, '').trim()); // Loại bỏ dấu ngoặc kép và khoảng trắng
                    const tr = document.createElement('tr');
                    cols.forEach(col => {
                        const td = document.createElement('td');
                        td.textContent = col;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            })
            .catch(error => console.error('Có lỗi xảy ra:', error));

        function filterTable() {
            const input = document.getElementById('search');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('data-table');
            const rows = table.getElementsByTagName('tr');

            for (let i = 1; i < rows.length; i++) { // Bắt đầu từ 1 để bỏ qua dòng tiêu đề
                const cells = rows[i].getElementsByTagName('td');
                let found = false;

                for (let j = 0; j < cells.length; j++) {
                    if (cells[j].textContent.toLowerCase().includes(filter)) {
                        found = true;
                        break;
                    }
                }

                rows[i].style.display = found ? '' : 'none';
            }
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị Dữ liệu từ Google Sheets</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <h2>Dữ liệu từ Google Sheets</h2>
    <table id="data-table">
        <thead>
            <tr>
                <th>Dấu thời gian</th>
                <th>SĐT</th>
                <th>Họ và tên</th>
                <th>Trường</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dữ liệu sẽ được thêm vào đây -->
        </tbody>
    </table>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1FwJtZwByjsBmpp46I2i0jyY-SzfzDEaOKEukctoHw2k/gviz/tq?tqx=out:csv';

        fetch(sheetUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Bỏ qua dòng tiêu đề
                const tbody = document.querySelector('#data-table tbody');
                rows.forEach(row => {
                    const cols = row.split(',').map(col => col.replace(/"/g, '').trim()); // Loại bỏ dấu ngoặc kép và khoảng trắng
                    const tr = document.createElement('tr');
                    cols.forEach(col => {
                        const td = document.createElement('td');
                        td.textContent = col;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            })
            .catch(error => console.error('Có lỗi xảy ra:', error));
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Trả Lời Câu Hỏi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }

        .question {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .option {
            background-color: #f2f2f2;
            border: 1px solid #ddd;
            padding: 10px;
            margin: 5px;
            width: 200px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .option:hover {
            background-color: #e0e0e0;
        }

        .result {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h3 style="color: red;">Đang thực hiện , chưa hoàn thiện</h3>
    <h3>Trò Chơi Trả Lời Câu Hỏi các bạn trả lời các câu hỏi và ghi nhớ sau đó ghé gian hàng của trường CĐ CNTT TP.HCM
        để trả lời câu hỏi và nhận quà</h3>
    <div class="question" id="question">Câu hỏi sẽ xuất hiện ở đây</div>
    <div class="options" id="options">
        <!-- Các đáp án sẽ được chèn vào đây -->
    </div>
    <div class="result" id="result"></div>
    <button id="next-button" style="display:none;">Câu tiếp theo</button>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/1EcpSZ8XmuDuT-z7QGbdaJp-FHHbj-pi79ST8C_y4wBY/gviz/tq?tqx=out:csv';
        let questions = [];
        let currentQuestionIndex = 0;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Mã lỗi: ' + response.status);
                }
                return response.text(); // Lấy dưới dạng text vì là CSV
            })
            .then(data => {
                const rows = data.split('\n'); // Tách dữ liệu theo dòng
                rows.forEach((row, index) => {
                    if (row && index > 0) { // Bỏ qua tiêu đề
                        const cells = row.split(','); // Tách theo dấu phẩy
                        questions.push({
                            question: cells[0].replace(/"/g, ''), // Câu hỏi
                            options: [
                                cells[1].replace(/"/g, ''), // A
                                cells[2].replace(/"/g, ''), // B
                                cells[3].replace(/"/g, ''), // C
                                cells[4].replace(/"/g, '')  // D
                            ],
                            correctAnswer: cells[5].replace(/"/g, '') // Đáp án đúng
                        });
                    }
                });
                showQuestion();
            })
            .catch(error => {
                console.error('Có lỗi xảy ra:', error);
            });

        function showQuestion() {
            const questionElement = document.getElementById('question');
            const optionsElement = document.getElementById('options');
            const resultElement = document.getElementById('result');
            const nextButton = document.getElementById('next-button');

            if (currentQuestionIndex < questions.length) {
                const currentQuestion = questions[currentQuestionIndex];
                questionElement.textContent = currentQuestion.question;
                optionsElement.innerHTML = ''; // Xóa đáp án cũ
                resultElement.textContent = ''; // Xóa kết quả trước
                nextButton.style.display = 'none'; // Ẩn nút tiếp theo

                currentQuestion.options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.textContent = option;
                    optionDiv.onclick = () => selectOption(option, currentQuestion.correctAnswer); // Xử lý sự kiện click
                    optionsElement.appendChild(optionDiv);
                });
            } else {
                questionElement.textContent = 'Cảm ơn bạn đã chơi!';
                optionsElement.innerHTML = '';
                nextButton.style.display = 'none';
            }
        }

        function selectOption(selectedOption, correctAnswer) {
            const resultElement = document.getElementById('result');
            const nextButton = document.getElementById('next-button');

            if (selectedOption === correctAnswer) {
                resultElement.textContent = 'Đúng rồi!';
            } else {
                resultElement.textContent = `Sai rồi! Đáp án đúng là ${correctAnswer}.`;
            }

            nextButton.style.display = 'inline'; // Hiện nút tiếp theo
            nextButton.onclick = () => {
                currentQuestionIndex++;
                showQuestion();
            };
        }
    </script>

</body>

</html>

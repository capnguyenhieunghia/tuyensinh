<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAO ĐẲNG ITC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            /* Prevent scrolling */
        }

        .carousel {
            height: 100vh;
            /* Full height */
            width: 100vw;
            /* Full width */
        }

        .carousel-item {
            height: 100%;
            /* Full height for each item */
        }

        .carousel-item img {
            object-fit: cover;
            /* Ensure images cover the area */
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</head>

<body>
    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel" data-bs-interval="1900">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./image/banner-web1.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web2.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web3.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web4.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web5.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web6.jpg" class="d-block" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./image/banner-web7.jpg" class="d-block" alt="...">
            </div>
        </div>
    </div>
</body>

</html>
